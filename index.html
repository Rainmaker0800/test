<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平工マッチング - ログイン</title>
    <link rel="stylesheet" href="index-style.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h1 id="form-title">ログイン</h1>
        
        <div class="input-group">
            <input type="text" id="email" placeholder="Email" inputmode="email">
            <input type="password" id="password" placeholder="Password">
            <input type="password" id="confirm-password" placeholder="Confirm Password" style="display: none;">
        </div>

        <p id="message" class="message"></p>

        <div class="button-group">
            <div id="login-section">
                <button class="btn-primary" onclick="handleLogin()">ログイン</button>
                <button class="btn-flat" onclick="toggleMode('register')">新規登録はこちら</button>
            </div>
            <div id="register-section" style="display: none;">
                <button class="btn-primary" onclick="handleRegister()">アカウント作成</button>
                <button class="btn-flat" onclick="toggleMode('login')">ログインに戻る</button>
            </div>
        </div>
    </div>
</div>

<script src="index-script.js"></script>
</body>
</html>
