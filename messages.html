<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メッセージ - 平工マッチング</title>
    <link rel="stylesheet" href="home-style.css">
    <style>
        /* チャット専用の高度なスタイル */
        .chat-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            height: 80vh; /* 画面の高さに合わせる */
            display: flex;
            flex-direction: column;
        }

        /* ヘッダー */
        .chat-header {
            padding: 15px 20px;
            background: #1a73e8;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .btn-back { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; }

        /* メッセージ表示エリア */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 吹き出しの共通設定 */
        .bubble {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        /* 相手のメッセージ（左側） */
        .msg-left {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* 自分のメッセージ（右側） */
        .msg-right {
            align-self: flex-end;
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* 入力エリア */
        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border 0.2s;
        }
        .chat-input-area input:focus { border-color: #1a73e8; }
        
        .btn-send {
            background: #1a73e8;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        /* リスト表示 */
        .chat-list-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .chat-list-item:hover { background: #f8f9fa; }
        .avatar-circle { width: 45px; height: 45px; background: #e8f0fe; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.href='home.html'">平工マッチング</div>
        <div class="nav-links">
            <span class="nav-item" onclick="location.href='home.html?tab=recruit'">募集</span>
            <span class="nav-item" onclick="location.href='home.html'">探す</span>
            <span class="nav-item active">メッセージ</span>
            <span class="nav-item" onclick="location.href='mypages.html'">マイページ</span>
            <button class="btn-logout" onclick="logout()">ログアウト</button>
        </div>
    </header>

    <main class="container">
        <div class="chat-container">
            <div id="view-list">
                <div style="padding: 20px; border-bottom: 1px solid #eee;">
                    <h3 style="margin:0;">トーク</h3>
                </div>
                <div id="chat-history-list"></div>
            </div>

            <div id="view-detail" style="display: none; flex-direction: column; height: 100%;">
                <div class="chat-header">
                    <div class="header-left">
                        <button class="btn-back" onclick="showList()">戻る</button>
                        <span id="target-name" style="font-weight:bold;">名前</span>
                    </div>
                </div>
                
                <div class="chat-messages" id="message-area">
                    </div>

                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeypress="handleEnter(event)">
                    <button class="btn-send" onclick="sendMessage()">▶</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwX2ie2URiBLke-9LpAD5edg3yXyleFGpollwhRiCRvG55Euz7Db_xNZboVTlG8yKA1/exec";
const myEmail = localStorage.getItem("userEmail");
let currentChatTarget = "";
let chatHistory = JSON.parse(localStorage.getItem("chatHistory") || "[]");

window.onload = function() {
    const target = localStorage.getItem("chatTarget");
    if (target) {
        if (!chatHistory.includes(target)) {
            chatHistory.push(target);
            localStorage.setItem("chatHistory", JSON.stringify(chatHistory));
        }
        localStorage.removeItem("chatTarget");
        openChat(target);
    } else {
        showList();
    }
    // 3秒ごとに新着チェックを開始
    setInterval(loadMessages, 3000);
};

function showList() {
    document.getElementById("view-list").style.display = "block";
    document.getElementById("view-detail").style.display = "none";
    currentChatTarget = "";
    const listArea = document.getElementById("chat-history-list");
    listArea.innerHTML = "";
    
    chatHistory.forEach(name => {
        const div = document.createElement("div");
        div.className = "chat-list-item";
        div.onclick = () => openChat(name);
        div.innerHTML = `<div class="avatar-circle">👤</div><div><strong>${name}</strong></div>`;
        listArea.appendChild(div);
    });
}

function openChat(name) {
    currentChatTarget = name;
    document.getElementById("view-list").style.display = "none";
    document.getElementById("view-detail").style.display = "flex";
    document.getElementById("target-name").innerText = name;
    loadMessages(); // 初回読み込み
}

async function sendMessage() {
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text || !currentChatTarget) return;

    input.value = "";
    try {
        await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ mode: "sendMessage", from: myEmail, to: currentChatTarget, text: text })
        });
        loadMessages();
    } catch (e) { console.error("送信エラー"); }
}

async function loadMessages() {
    if (!currentChatTarget) return;
    try {
        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ mode: "getMessages", user1: myEmail, user2: currentChatTarget })
        });
        const result = await res.json();
        if (result.status === "success") {
            const area = document.getElementById("message-area");
            area.innerHTML = "";
            result.message.forEach(msg => {
                const type = (msg.from === myEmail) ? "msg-right" : "msg-left";
                const div = document.createElement("div");
                div.className = "bubble " + type;
                div.innerText = msg.text;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        }
    } catch (e) { }
}

function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }
function logout() { if(confirm("ログアウト?")) window.location.href = "index.html"; }
    </script>
</body>
</html>
